{{ define "main" }}
<div class="doc">
  <div class="wrap">
    <div class="page-title">
      <h1>Page not found</h1>
      <p class="summary">The page you are looking for does not exist — it may have moved during the site rebuild.</p>
    </div>
    <div class="btnrow">
      <a class="btn accent" href="{{ site.Home.RelPermalink }}">Back to the overview →</a>
      {{ range site.Menus.main }}{{ if ne .URL site.Home.RelPermalink }}<a class="btn ghost" href="{{ .URL }}">{{ .Name }}</a>{{ end }}{{ end }}
    </div>
  </div>
</div>
{{ end }}
