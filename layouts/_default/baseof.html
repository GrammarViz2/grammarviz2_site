<!doctype html>
<html lang="en" data-accent="{{ site.Params.accent | default "grammarviz" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    // mobile nav
    document.querySelector('.nav-toggle')?.addEventListener('click', function () {
      document.querySelector('.nav')?.classList.toggle('open');
    });
  </script>
</body>
</html>
